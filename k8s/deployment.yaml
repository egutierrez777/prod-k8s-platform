apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: go-deployment
  name: go-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-deployment
  strategy: {}
  template:
    metadata:
      labels:
        app: go-deployment
    spec:
      containers:
      - image: egutierrez777/go-app:v1
        name: go-app
        resources: {}
	livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 2
          periodSeconds: 5
